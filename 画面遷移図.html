<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲食店向け勤怠管理システム｜画面遷移図</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3050;
    --accent-admin: #3b82f6;
    --accent-admin-dim: #1e3a5f;
    --accent-emp: #10b981;
    --accent-emp-dim: #064e3b;
    --accent-shared: #f59e0b;
    --accent-shared-dim: #451a03;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --arrow: #475569;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    margin-bottom: 8px;
  }

  header p {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }

  .legend {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* ── メインレイアウト ── */
  .diagram {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── ログイン画面 ── */
  .login-row {
    display: flex;
    justify-content: center;
    margin-bottom: 0;
  }

  /* ── 分岐エリア ── */
  .branch-row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
    position: relative;
  }

  .role-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex: 1;
    max-width: 460px;
  }

  /* ── カード ── */
  .screen-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    width: 200px;
    position: relative;
    transition: transform 0.15s;
  }

  .screen-card:hover {
    transform: translateY(-2px);
  }

  .screen-card.shared {
    border-color: var(--accent-shared);
    background: linear-gradient(135deg, var(--surface) 60%, #1a1500);
  }

  .screen-card.admin {
    border-color: var(--accent-admin);
    background: linear-gradient(135deg, var(--surface) 60%, #0a1628);
  }

  .screen-card.employee {
    border-color: var(--accent-emp);
    background: linear-gradient(135deg, var(--surface) 60%, #021a10);
  }

  .card-icon {
    font-size: 1.3rem;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 0.68rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .card-badge {
    position: absolute;
    top: -9px;
    right: 10px;
    font-size: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .badge-shared { background: var(--accent-shared); color: #000; }
  .badge-admin  { background: var(--accent-admin);  color: #fff; }
  .badge-emp    { background: var(--accent-emp);    color: #000; }

  /* ── SVG 矢印コンテナ ── */
  .arrows-svg {
    display: block;
    overflow: visible;
  }

  /* ── セクションタイトル ── */
  .role-header {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .role-header.admin {
    background: var(--accent-admin-dim);
    color: var(--accent-admin);
    border: 1px solid var(--accent-admin);
  }

  .role-header.emp {
    background: var(--accent-emp-dim);
    color: var(--accent-emp);
    border: 1px solid var(--accent-emp);
  }

  /* ── グリッドレイアウト（カード配置） ── */
  .flow-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  /* vertical connector */
  .v-connector {
    width: 2px;
    background: var(--arrow);
    position: relative;
  }

  .v-connector::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 6px solid var(--arrow);
  }

  /* 矢印ラベル */
  .arrow-label {
    font-size: 0.62rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    padding: 0 4px;
  }

  /* ─────────────── SVG diagram ─────────────── */
  .svg-wrapper {
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    overflow-x: auto;
  }

  svg text { font-family: 'Noto Sans JP', sans-serif; }

  /* カード（SVG foreignObject内） */
  .fo-card {
    background: var(--surface);
    border-radius: 8px;
    padding: 10px 12px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .fo-card .icon { font-size: 1.1rem; margin-bottom: 3px; }
  .fo-card .title { font-size: 0.78rem; font-weight: 700; color: #fff; }
  .fo-card .desc  { font-size: 0.63rem; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }

  /* note box */
  .note {
    font-size: 0.68rem;
    color: var(--text-muted);
    border-left: 2px solid var(--border);
    padding-left: 10px;
    margin-top: 32px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.8;
  }

  @media (max-width: 640px) {
    .svg-wrapper { overflow-x: scroll; }
  }
</style>
</head>
<body>

<header>
  <h1>飲食店向け勤怠管理システム</h1>
  <p>SCREEN TRANSITION DIAGRAM  ·  v1.0</p>
</header>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#f59e0b"></div>
    <span>共通画面</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#3b82f6"></div>
    <span>管理者（店長）専用</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#10b981"></div>
    <span>従業員（アルバイト）専用</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#475569; border-radius:50%"></div>
    <span>画面遷移</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#7c3aed; border-radius:50%"></div>
    <span>承認フロー</span>
  </div>
</div>

<div class="svg-wrapper">
<svg viewBox="0 0 960 820" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <!-- カード背景 -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════ ログイン画面 ══════════════ -->
  <!-- カード背景 -->
  <rect x="370" y="20" width="220" height="80" rx="10"
        fill="#181c27" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- バッジ -->
  <rect x="430" y="12" width="60" height="16" rx="8" fill="#f59e0b"/>
  <text x="460" y="23" text-anchor="middle" fill="#000" font-size="9" font-weight="700" font-family="JetBrains Mono, monospace">SHARED</text>
  <!-- アイコン＋テキスト -->
  <text x="390" y="48" fill="#fff" font-size="16">🔐</text>
  <text x="415" y="47" fill="#fff" font-size="12" font-weight="700">ログイン画面</text>
  <text x="415" y="61" fill="#64748b" font-size="9">メール＋パスワード認証</text>
  <text x="415" y="73" fill="#64748b" font-size="9">ロール判定 → 各ダッシュボードへ</text>

  <!-- ログインからの分岐ライン -->
  <!-- 中央 → 左（管理者） -->
  <line x1="480" y1="100" x2="480" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="118" x2="230" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="230" y1="118" x2="230" y2="136" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- 中央 → 右（従業員） -->
  <line x1="480" y1="118" x2="730" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="730" y1="118" x2="730" y2="136" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <text x="310" y="113" fill="#64748b" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">管理者ロール</text>
  <text x="650" y="113" fill="#64748b" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">従業員ロール</text>

  <!-- ══════════════ 管理者側 ══════════════ -->
  <!-- 管理者ダッシュボード -->
  <rect x="120" y="136" width="220" height="80" rx="10"
        fill="#181c27" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="170" y="128" width="80" height="16" rx="8" fill="#3b82f6"/>
  <text x="210" y="139" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" font-family="JetBrains Mono, monospace">ADMIN</text>
  <text x="140" y="164" fill="#fff" font-size="14">🏠</text>
  <text x="162" y="163" fill="#fff" font-size="12" font-weight="700">管理者ダッシュボード</text>
  <text x="162" y="177" fill="#64748b" font-size="9">全従業員の勤怠ステータス確認</text>
  <text x="162" y="189" fill="#64748b" font-size="9">各機能へのナビゲーション</text>

  <!-- 管理者DAから各画面へ -->
  <line x1="230" y1="216" x2="230" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- 全従業員勤怠一覧 -->
  <rect x="120" y="240" width="220" height="70" rx="10" fill="#181c27" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="264" fill="#fff" font-size="12">📋</text>
  <text x="160" y="263" fill="#fff" font-size="12" font-weight="700">全従業員勤怠一覧</text>
  <text x="160" y="277" fill="#64748b" font-size="9">従業員別・日付別の出退勤一覧</text>
  <text x="160" y="289" fill="#64748b" font-size="9">月・週フィルター</text>

  <line x1="230" y1="310" x2="230" y2="330" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- 修正申請管理 -->
  <rect x="120" y="330" width="220" height="70" rx="10" fill="#181c27" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="354" fill="#fff" font-size="12">✏️</text>
  <text x="162" y="353" fill="#fff" font-size="12" font-weight="700">修正申請一覧・承認</text>
  <text x="162" y="367" fill="#64748b" font-size="9">申請一覧（未承認 / 承認済 / 却下）</text>
  <text x="162" y="379" fill="#64748b" font-size="9">申請内容確認・承認・却下操作</text>

  <line x1="230" y1="400" x2="230" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- 月次集計 -->
  <rect x="120" y="420" width="220" height="70" rx="10" fill="#181c27" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="444" fill="#fff" font-size="12">📊</text>
  <text x="162" y="443" fill="#fff" font-size="12" font-weight="700">月次集計画面</text>
  <text x="162" y="457" fill="#64748b" font-size="9">指定月の従業員別勤務時間集計</text>
  <text x="162" y="469" fill="#64748b" font-size="9">実働時間・休憩時間の合計表示</text>

  <line x1="230" y1="490" x2="230" y2="510" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- CSV出力 -->
  <rect x="120" y="510" width="220" height="60" rx="10" fill="#181c27" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="534" fill="#fff" font-size="12">💾</text>
  <text x="162" y="533" fill="#fff" font-size="12" font-weight="700">CSV出力</text>
  <text x="162" y="547" fill="#64748b" font-size="9">月次勤怠データをCSVダウンロード</text>
  <text x="162" y="559" fill="#64748b" font-size="9">給与計算ソフト連携用</text>

  <!-- ══════════════ 従業員側 ══════════════ -->
  <!-- 従業員ダッシュボード -->
  <rect x="620" y="136" width="220" height="80" rx="10"
        fill="#181c27" stroke="#10b981" stroke-width="1.5"/>
  <rect x="665" y="128" width="90" height="16" rx="8" fill="#10b981"/>
  <text x="710" y="139" text-anchor="middle" fill="#000" font-size="9" font-weight="700" font-family="JetBrains Mono, monospace">EMPLOYEE</text>
  <text x="640" y="164" fill="#fff" font-size="14">🏠</text>
  <text x="662" y="163" fill="#fff" font-size="12" font-weight="700">従業員ダッシュボード</text>
  <text x="662" y="177" fill="#64748b" font-size="9">本日の勤怠ステータス表示</text>
  <text x="662" y="189" fill="#64748b" font-size="9">打刻ボタンへのショートカット</text>

  <line x1="730" y1="216" x2="730" y2="240" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 打刻画面 -->
  <rect x="620" y="240" width="220" height="80" rx="10" fill="#181c27" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="264" fill="#fff" font-size="12">⏱</text>
  <text x="660" y="263" fill="#fff" font-size="12" font-weight="700">打刻画面</text>
  <text x="660" y="277" fill="#64748b" font-size="9">出勤 / 休憩開始 / 休憩終了 / 退勤</text>
  <text x="660" y="289" fill="#64748b" font-size="9">現在時刻表示・ボタン状態制御</text>
  <text x="660" y="301" fill="#64748b" font-size="9">打刻済み時刻の確認</text>

  <line x1="730" y1="320" x2="730" y2="340" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 自身の勤怠確認 -->
  <rect x="620" y="340" width="220" height="70" rx="10" fill="#181c27" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="364" fill="#fff" font-size="12">📅</text>
  <text x="662" y="363" fill="#fff" font-size="12" font-weight="700">自身の勤怠確認</text>
  <text x="662" y="377" fill="#64748b" font-size="9">日別の出退勤・休憩・実働時間一覧</text>
  <text x="662" y="389" fill="#64748b" font-size="9">月切り替え表示</text>

  <line x1="730" y1="410" x2="730" y2="430" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 修正申請 -->
  <rect x="620" y="430" width="220" height="70" rx="10" fill="#181c27" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="454" fill="#fff" font-size="12">📝</text>
  <text x="662" y="453" fill="#fff" font-size="12" font-weight="700">打刻修正申請</text>
  <text x="662" y="467" fill="#64748b" font-size="9">修正対象日・修正内容・理由入力</text>
  <text x="662" y="479" fill="#64748b" font-size="9">申請履歴・承認状況確認</text>

  <!-- ══════════ 承認フロー矢印 ══════════ -->
  <!-- 従業員の修正申請 → 管理者の修正申請管理 -->
  <path d="M620,465 C520,465 460,365 340,365" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <rect x="430" y="430" width="100" height="20" rx="4" fill="#1e1333"/>
  <text x="480" y="444" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="JetBrains Mono, monospace">申請 → 承認フロー</text>

  <!-- ══════════ 共通：プロフィール設定 ══════════ -->
  <rect x="370" y="620" width="220" height="70" rx="10" fill="#181c27" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="420" y="612" width="100" height="16" rx="8" fill="#f59e0b"/>
  <text x="470" y="623" text-anchor="middle" fill="#000" font-size="9" font-weight="700" font-family="JetBrains Mono, monospace">SHARED</text>
  <text x="390" y="648" fill="#fff" font-size="12">⚙️</text>
  <text x="412" y="647" fill="#fff" font-size="12" font-weight="700">プロフィール設定</text>
  <text x="412" y="661" fill="#64748b" font-size="9">パスワード変更・表示名変更</text>
  <text x="412" y="673" fill="#64748b" font-size="9">ログアウト</text>

  <!-- ダッシュボード → プロフィール設定 -->
  <path d="M230,216 C230,600 370,645 370,655" stroke="#475569" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M730,216 C730,600 590,645 590,655" stroke="#475569" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ── ログアウト → ログイン ── -->
  <line x1="480" y1="690" x2="480" y2="720" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="370" y="720" width="220" height="50" rx="10" fill="#181c27" stroke="#475569" stroke-width="1"/>
  <text x="480" y="749" text-anchor="middle" fill="#64748b" font-size="10">ログアウト → ログイン画面へ戻る</text>

  <!-- ── 区切り線 ── -->
  <line x1="480" y1="140" x2="480" y2="780" stroke="#2a3050" stroke-width="1" stroke-dasharray="3,6"/>
  <text x="480" y="800" text-anchor="middle" fill="#2a3050" font-size="10" font-family="JetBrains Mono, monospace">ADMIN ←————————|————————→ EMPLOYEE</text>

</svg>
</div>

<div class="note" style="margin-top:24px;">
  <strong style="color:#94a3b8;">補足</strong><br>
  ・管理者・従業員ともにログイン後はロールに応じたダッシュボードに遷移します。<br>
  ・修正申請は従業員が申請 → 管理者が承認/却下するフローです（紫の破線矢印）。<br>
  ・プロフィール設定・ログアウトは全ロール共通機能です。<br>
  ・CSV出力は管理者の月次集計画面から実行します。
</div>

</body>
</html>
